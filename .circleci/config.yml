version: 2.1

jobs:
  build-thorium-arm64:
    macos:
      xcode: "16.2.0"

    resource_class: m4pro.medium

    environment:
      DEPOT_TOOLS_UPDATE: "0"
      GCLIENT_PY3: "1"

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: |
            brew update
            brew install python git

            git config --global user.name "runner"
            git config --global user.email "runner@localhost"

      - run:
          name: Install depot_tools
          command: |
            cd $HOME

            git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git

            echo 'export PATH="$HOME/depot_tools:$PATH"' >> $BASH_ENV
            source $BASH_ENV

            which gclient
            gclient --version


      - run:
          name: Fetch Chromium source
          no_output_timeout: 60m
          command: |
            source $BASH_ENV

            mkdir -p $HOME/chromium
            cd $HOME/chromium

            fetch --no-history chromium


      - run:
          name: Prepare Thorium patches
          no_output_timeout: 60m
          command: |
            source $BASH_ENV

            cd $CIRCLE_WORKING_DIRECTORY

            python3 ./trunk.py

            python3 ./version.py

            python3 ./setup.py --mac


      - run:
          name: Configure GN ARM64 build
          command: |
            source $BASH_ENV

            cd $HOME/chromium/src

            mkdir -p out/thorium

            cp $CIRCLE_WORKING_DIRECTORY/other/Mac/mac_ARM_args.gn \
              out/thorium/args.gn

            PGO_FILE=$(find $HOME/chromium/src/build/pgo_profiles \
              -name "*.profdata" \
              | head -n 1)

            if [ -z "$PGO_FILE" ]; then
              echo "PGO profile not found"
              exit 1
            fi

            sed -i '' \
              "s|# pgo_data_path = \".*\"|pgo_data_path = \"$PGO_FILE\"|" \
              out/thorium/args.gn

            echo "Using PGO profile:"
            echo "$PGO_FILE"

            gn args out/thorium --list


      - run:
          name: Build Thorium ARM64
          no_output_timeout: 120m
          command: |
            source $BASH_ENV

            cd $HOME/chromium/src

            autoninja \
              -C out/thorium \
              thorium


      - run:
          name: Create DMG
          command: |
            source $BASH_ENV

            cd $CIRCLE_WORKING_DIRECTORY

            python3 ./create_dmg.py


      - store_artifacts:
          path: $HOME/chromium/src/out/thorium/Thorium.dmg
          destination: Thorium-arm64.dmg


workflows:
  build:
    jobs:
      - build-thorium-arm64
